<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloco de Notas</title>

  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Ubuntu', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f5f5f5;
    }

    header {
      background: #333;
      color: white;
      padding: 10px;
      text-align: center;
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      padding: 15px;
      padding-bottom: 60px; /* espaço para o indicador */
      font-size: 16px;
      resize: none;
      outline: none;
      box-sizing: border-box;
      font-family: 'Ubuntu', sans-serif;
      text-align: justify;
    }

    .buttons {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #eee;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .print { background: #4CAF50; color: white; }
    .clear { background: #f44336; color: white; }
    .font  { background: #2196F3; color: white; flex: 0.5; }

    .font-info {
      position: absolute;
      bottom: 70px; /* sobe acima dos botões */
      right: 15px;
      font-size: 14px;
      color: #333;
      background: rgba(255,255,255,0.9);
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      pointer-events: none;
      z-index: 10;
    }

    @media (max-width: 480px) {
      .font {
        order: -1;
        flex: 1 1 100%;
      }

      .print, .clear {
        flex: 1 1 100%;
      }
    }

    @media print {
      header, .buttons, .font-info {
        display: none;
      }

      textarea {
        border: none;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

<header>
  <h2>Bloco de Notas</h2>
</header>

<textarea id="note" placeholder="Digite suas anotações aqui..."></textarea>

<div class="buttons">
  <button class="font" onclick="decreaseFont()">A-</button>
  <button class="font" onclick="increaseFont()">A+</button>
  <button class="print" onclick="printNote()">Imprimir / Salvar PDF</button>
  <button class="clear" onclick="clearNote()">Limpar</button>
</div>

<div class="font-info" id="fontInfo"></div>

<script>
  const textarea = document.getElementById('note');
  const fontInfo = document.getElementById('fontInfo');

  let fontSize = parseInt(localStorage.getItem('fontSize')) || 16;

  function updateFont() {
    textarea.style.fontSize = fontSize + 'px';
    fontInfo.textContent = 'Fonte: ' + fontSize + 'px';
    localStorage.setItem('fontSize', fontSize);
  }

  updateFont();

  textarea.value = localStorage.getItem('note') || '';

  textarea.addEventListener('input', () => {
    localStorage.setItem('note', textarea.value);
  });

  function printNote() {
    window.print();
  }

  function clearNote() {
    if (confirm('Deseja apagar tudo?')) {
      textarea.value = '';
      localStorage.removeItem('note');
    }
  }

  function increaseFont() {
    fontSize += 2;
    updateFont();
  }

  function decreaseFont() {
    fontSize = Math.max(10, fontSize - 2);
    updateFont();
  }
</script>

</body>
</html>
